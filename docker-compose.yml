services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rtpi-postgres
    environment:
      POSTGRES_USER: rtpi
      POSTGRES_PASSWORD: rtpi
      POSTGRES_DB: rtpi_main
    ports:
      - "5434:5432"  # Changed from 5432 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro  # Creates sysreptor DB on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtpi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtpi-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rtpi-redis
    ports:
      - "6381:6379"  # Changed from 6379 to avoid conflicts
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtpi-network

  # RTPI Security Tools Container
  rtpi-tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: rtpi-tools
    network_mode: "host"
    volumes:
      - tool-results:/var/log/rtpi
      - tool-configs:/opt/tools/config
      - shared-data:/shared
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "echo", "healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PowerShell Empire C2 Server
  empire-server:
    image: bcsecurity/empire:latest
    container_name: rtpi-empire
    ports:
      # REST API (1337) and Web UI (5001) proxied through empire-proxy
      - "8080-8100:8080-8100"  # Dynamic listener ports (direct, no proxy needed)
    environment:
      # Database connection (shared PostgreSQL)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rtpi_main
      POSTGRES_USER: rtpi
      POSTGRES_PASSWORD: rtpi
      # Empire configuration
      EMPIRE_USERNAME: empireadmin
      EMPIRE_PASSWORD: ${EMPIRE_PASSWORD:-Islamist-Repeal1-Unhealthy-Amulet-Survival}
      RESTPORT: 1337
      # Optional: Enable SocketIO for real-time events
      SOCKETIO_ENABLED: "true"
      SOCKETIO_PORT: 5002
    volumes:
      - empire-data:/opt/Empire/data
      - empire-downloads:/opt/Empire/downloads
      - shared-data:/shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://0.0.0.0:1337/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Empire Reverse Proxy — normalizes paths (fixes Starkiller //token double-slash)
  empire-proxy:
    image: nginx:alpine
    container_name: rtpi-empire-proxy
    ports:
      - "1337:1337"     # Empire REST API (proxied)
      - "5001:5001"     # Empire Web UI (proxied)
    volumes:
      - ./docker/empire-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - empire-server
    networks:
      - rtpi-network
    restart: unless-stopped

  # ATT&CK Workbench MongoDB Database
  workbench-db:
    image: mongo:7
    container_name: rtpi-workbench-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: workbench
      MONGO_INITDB_ROOT_PASSWORD: ${WORKBENCH_DB_PASSWORD:-workbench123}
      MONGO_INITDB_DATABASE: attack-workbench
    ports:
      - "27017:27017"
    volumes:
      - workbench-db-data:/data/db
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "-u", "workbench", "-p", "workbench123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ATT&CK Workbench REST API
  workbench-api:
    image: ghcr.io/center-for-threat-informed-defense/attack-workbench-rest-api:latest
    container_name: rtpi-workbench-api
    ports:
      - "3010:3010"
    environment:
      # MongoDB connection
      MONGODB_URL: mongodb://workbench:${WORKBENCH_DB_PASSWORD:-workbench123}@workbench-db:27017/attack-workbench?authSource=admin
      DATABASE_URL: mongodb://workbench:${WORKBENCH_DB_PASSWORD:-workbench123}@workbench-db:27017/attack-workbench?authSource=admin
      # API configuration
      PORT: 3010
      # CORS configuration - allow RTPI frontend
      CORS_ORIGIN: "http://localhost:5000,http://localhost:3000,http://localhost:3001,http://localhost:3020"
      # Session configuration
      SESSION_SECRET: ${WORKBENCH_SESSION_SECRET:-change-this-secret-key}
      # Authentication (optional)
      AUTHN_MECHANISM: anonymous
    depends_on:
      workbench-db:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:3010/api/collections > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ATT&CK Workbench Frontend (Optional - for direct access)
  workbench-frontend:
    image: ghcr.io/center-for-threat-informed-defense/attack-workbench-frontend:latest
    container_name: rtpi-workbench-frontend
    ports:
      - "3020:80"
    environment:
      # API endpoint configuration
      WORKBENCH_REST_API_URL: http://workbench-api:3010/api
    depends_on:
      workbench-api:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped

  # ============================================================================
  # Kasm Workspaces - Browser-Based Desktop Streaming Platform
  # All Kasm services are in the 'kasm' profile and must be explicitly enabled
  # Usage: docker compose --profile kasm up -d
  # ============================================================================

  # Kasm DB Certificate Init - Generates self-signed SSL certs for kasm-db
  kasm-db-init:
    image: alpine:latest
    container_name: rtpi-kasm-db-init
    profiles:
      - kasm  # Only start with Kasm profile
    volumes:
      - kasm-db-certs:/certs
      - ./scripts/kasm:/scripts:ro
    command: >
      sh -c "
        apk add --no-cache openssl &&
        /scripts/init-db-certs.sh
      "
    networks:
      - rtpi-network

  # Kasm PostgreSQL Database (separate from main RTPI database)
  kasm-db:
    image: postgres:16-alpine
    container_name: rtpi-kasm-db
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      POSTGRES_USER: kasmapp
      POSTGRES_PASSWORD: ${KASM_DB_PASSWORD:-kasm123secure}
      POSTGRES_DB: kasm
    ports:
      - "5433:5432"  # Different port to avoid conflict with main postgres
    volumes:
      - kasm-db-data:/var/lib/postgresql/data
      - kasm-db-certs:/etc/ssl/certs/kasm:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasmapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kasm-db-init:
        condition: service_completed_successfully
    networks:
      - rtpi-network
    restart: unless-stopped

  # Kasm Redis Cache (separate from main RTPI Redis)
  kasm-redis:
    image: redis:5-alpine
    container_name: rtpi-kasm-redis
    profiles:
      - kasm  # Only start with Kasm profile
    ports:
      - "6380:6379"  # Different port to avoid conflict with main redis
    volumes:
      - kasm-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtpi-network
    restart: unless-stopped

  # Kasm API Server - REST API for workspace management
  kasm-api:
    image: kasmweb/api:1.17.0
    container_name: rtpi-kasm-api
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      # Database connection
      DATABASE_HOSTNAME: kasm-db
      DATABASE_PORT: 5432
      DATABASE_USER: kasmapp
      DATABASE_PASSWORD: ${KASM_DB_PASSWORD:-kasm123secure}
      DATABASE_NAME: kasm
      DATABASE_SSL: "false"
      # Redis connection
      REDIS_HOSTNAME: kasm-redis
      REDIS_PORT: 6379
      # API configuration
      API_SERVER_ID: ${KASM_API_SERVER_ID:-default}
      SERVER_HOSTNAME: ${KASM_SERVER_HOSTNAME:-localhost}
      SERVER_ZONE: default
      # SSL/TLS
      HTTPS_ENABLED: "true"
      SSL_CERT_FILE: /opt/kasm/current/certs/kasm_nginx.crt
      SSL_KEY_FILE: /opt/kasm/current/certs/kasm_nginx.key
    ports:
      - "8443:443"  # Kasm HTTPS API port
    volumes:
      - kasm-api-data:/opt/kasm/current
      - kasm-certs:/opt/kasm/current/certs
    depends_on:
      kasm-db:
        condition: service_healthy
      kasm-redis:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:443/api/__healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Kasm Manager - Workspace lifecycle management
  kasm-manager:
    image: kasmweb/manager:1.17.0
    container_name: rtpi-kasm-manager
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      # Database connection
      DATABASE_HOSTNAME: kasm-db
      DATABASE_PORT: 5432
      DATABASE_USER: kasmapp
      DATABASE_PASSWORD: ${KASM_DB_PASSWORD:-kasm123secure}
      DATABASE_NAME: kasm
      # Redis connection
      REDIS_HOSTNAME: kasm-redis
      REDIS_PORT: 6379
      # Manager configuration
      MANAGER_ID: ${KASM_MANAGER_ID:-default-manager}
      SERVER_HOSTNAME: ${KASM_SERVER_HOSTNAME:-localhost}
    volumes:
      - kasm-manager-data:/opt/kasm/current
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for workspace management
    depends_on:
      kasm-db:
        condition: service_healthy
      kasm-redis:
        condition: service_healthy
      kasm-api:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped

  # Kasm Proxy (Nginx) - Reverse proxy for workspace access
  kasm-proxy:
    image: nginx:alpine
    container_name: rtpi-kasm-proxy
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      - SERVER_HOSTNAME=${KASM_SERVER_HOSTNAME:-localhost}
    ports:
      - "8443:443"  # HTTPS for workspace access
      - "8080:80"   # HTTP redirect to HTTPS
    volumes:
      - kasm-proxy-config:/etc/nginx/conf.d
      - kasm-certs:/etc/nginx/certs:ro
    depends_on:
      - kasm-api
      - kasm-guac
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kasm Guacamole - Remote desktop protocol gateway
  kasm-guac:
    image: kasmweb/kasm-guac:1.17.0
    container_name: rtpi-kasm-guac
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      # Database connection for session tracking
      POSTGRES_HOSTNAME: kasm-db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: kasm
      POSTGRES_USER: kasmapp
      POSTGRES_PASSWORD: ${KASM_DB_PASSWORD:-kasm123secure}
      # Guacamole configuration
      GUACD_HOSTNAME: localhost
      GUACD_PORT: 4822
    ports:
      - "4822:4822"  # Guacamole daemon port
    volumes:
      - kasm-guac-data:/opt/kasm/current
    depends_on:
      kasm-db:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped

  # Kasm Agent - Workspace provisioning and monitoring
  kasm-agent:
    image: kasmweb/agent:1.17.0
    container_name: rtpi-kasm-agent
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      # API connection
      API_HOSTNAME: kasm-api
      API_PORT: 443
      # Agent configuration
      AGENT_ID: ${KASM_AGENT_ID:-default-agent}
      SERVER_HOSTNAME: ${KASM_SERVER_HOSTNAME:-localhost}
      PUBLIC_HOSTNAME: ${KASM_PUBLIC_HOSTNAME:-localhost}
    volumes:
      - kasm-agent-data:/opt/kasm/current
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for container management
    depends_on:
      kasm-api:
        condition: service_healthy
      kasm-manager:
        condition: service_started
    networks:
      - rtpi-network
    restart: unless-stopped

  # Kasm Share - File sharing service for workspaces
  kasm-share:
    image: kasmweb/share:1.17.0
    container_name: rtpi-kasm-share
    profiles:
      - kasm  # Only start with Kasm profile
    environment:
      # Redis connection for share tracking
      REDIS_HOSTNAME: kasm-redis
      REDIS_PORT: 6379
      # Share service configuration
      SHARE_ID: ${KASM_SHARE_ID:-default-share}
    ports:
      - "8182:8182"  # File sharing port
    volumes:
      - kasm-share-data:/opt/kasm/current/shares
    depends_on:
      kasm-redis:
        condition: service_healthy
    networks:
      - rtpi-network
    restart: unless-stopped

  # Certbot - Automated SSL/TLS certificate management
  # Supports both HTTP-01 and DNS-01 (Cloudflare) challenges
  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: rtpi-certbot
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@example.com}
      - CERTBOT_DOMAIN=${KASM_SERVER_HOSTNAME:-localhost}
      # Cloudflare API token for DNS-01 challenge (#KW-12)
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - kasm-certs:/etc/nginx/certs
      - ./scripts/ssl:/scripts/ssl:ro  # SSL automation scripts
    command: >
      sh -c "
      # Create Cloudflare credentials if API token is set
      if [ -n \"$$CLOUDFLARE_API_TOKEN\" ]; then
        echo \"dns_cloudflare_api_token = $$CLOUDFLARE_API_TOKEN\" > /etc/letsencrypt/cloudflare.ini
        chmod 600 /etc/letsencrypt/cloudflare.ini
      fi

      # Certificate renewal loop (#KW-13)
      trap exit TERM
      while :; do
        # Renew certificates expiring within 30 days
        certbot renew --quiet

        # Copy certificates to nginx directory
        if [ -d /etc/letsencrypt/live ]; then
          for domain in /etc/letsencrypt/live/*; do
            if [ -d \"$$domain\" ]; then
              domain_name=\$$(basename \"$$domain\")
              cp -L \"$$domain/fullchain.pem\" \"/etc/nginx/certs/\$${domain_name}.crt\" 2>/dev/null || true
              cp -L \"$$domain/privkey.pem\" \"/etc/nginx/certs/\$${domain_name}.key\" 2>/dev/null || true
            fi
          done
        fi

        # Renewal runs every 12 hours
        sleep 12h & wait $$!
      done
      "
    networks:
      - rtpi-network
    restart: unless-stopped
    profiles:
      - certbot  # Optional profile - only start if SSL automation is needed

  # ===========================================================================
  # Local LLM Inference Services
  # ===========================================================================
  #
  # RKLLama (RK3588 NPU-accelerated inference) — RECOMMENDED for Orange Pi 5 Plus
  #
  # RKLLama runs as a native systemd service on the host (not in Docker) for
  # direct NPU device access. It implements the Ollama API on port 11434, so
  # RTPI connects via OLLAMA_HOST=http://localhost:11434 with zero changes.
  #
  # Setup:
  #   git clone https://github.com/notpunchnox/rkllama && cd rkllama
  #   pip install "packaging>=24.2" && pip install --no-build-isolation .
  #   rkllama_client pull qwen2.5:3b
  #   rkllama_client pull tinyllama:1.1b
  #   sudo cp scripts/rkllama.service /etc/systemd/system/
  #   sudo systemctl enable --now rkllama
  #
  # .env config:
  #   RKLLM_MODE=true
  #   PREFER_LOCAL_AI=true
  #   OLLAMA_HOST=http://localhost:11434
  #
  # The Ollama Docker services below are retained for non-RK3588 deployments.
  # They use Docker profiles and will NOT start unless explicitly activated.
  # ===========================================================================

  # Ollama (GPU-accelerated inference — for NVIDIA GPU deployments only)
  ollama:
    image: ollama/ollama:latest
    container_name: rtpi-ollama
    profiles:
      - gpu  # Only start if GPU is available (not used on RK3588)
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=30m  # Auto-unload after 30 min inactivity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama CPU Fallback (for systems without GPU or NPU)
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: rtpi-ollama-cpu
    profiles:
      - cpu  # Only start if no GPU/NPU available (not used on RK3588)
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=1  # Limit parallelism on CPU
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=30m  # Auto-unload after 30 min inactivity
      - OLLAMA_NUM_THREAD=8  # CPU threads to use
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Open WebUI (LLM chat interface — connects to RKLLama on host)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rtpi-open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=false
      - WEBUI_NAME=RTPI Local LLM (RKLLama NPU)
    networks:
      - rtpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # OffSec Agent Containers (v2.2 Enhancement)
  # Specialized security tool containers with MCP server integration
  # ===========================================================================

  # OffSec Base Image (built first, used by all agents)
  offsec-base:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.base
    image: rtpi/offsec-base:latest
    profiles:
      - build-only  # Only used for building, not running

  # Maldev Agent - Binary Analysis, Reverse Engineering, ROP Development
  # MITRE Tactics: Defense Evasion, Execution, Persistence
  offsec-maldev:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.maldev-tools
    image: rtpi/maldev-tools:latest
    container_name: rtpi-maldev-agent
    stdin_open: true
    environment:
      - AGENT_TYPE=maldev
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
    volumes:
      - maldev-tools:/opt/tools
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Azure-AD Agent - Azure & Active Directory Attack Research
  # MITRE Tactics: Credential Access, Persistence, Lateral Movement
  offsec-azure-ad:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.azure-ad-tools
    image: rtpi/azure-ad-tools:latest
    container_name: rtpi-azure-ad-agent
    stdin_open: true
    environment:
      - AGENT_TYPE=azure-ad
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
    volumes:
      - azure-ad-tools:/opt/tools
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Burp Suite Agent - Web Application Security Testing
  # MITRE Tactics: Reconnaissance, Initial Access
  offsec-burp:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.burp-tools
    image: rtpi/burp-tools:latest
    container_name: rtpi-burp-agent
    stdin_open: true
    environment:
      - AGENT_TYPE=burp-suite
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
      - BURP_MCP_ENABLED=true
      - MCP_PORT=9876
      - ACTIVATION_MODE=dormant
    ports:
      - "9876:9876"   # Burp MCP Server
      - "8082:8082"   # Burp Proxy (when active)
    volumes:
      - burp-tools:/opt/tools
      - burp-setup:/opt/burp-setup
      - burp-projects:/opt/burp-projects
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f burp-entrypoint || true"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Empire C2 Agent - Command & Control, Post-Exploitation
  # MITRE Tactics: Command and Control, Lateral Movement, Persistence
  offsec-empire:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.empire-tools
    image: rtpi/empire-tools:latest
    container_name: rtpi-empire-agent
    stdin_open: true
    environment:
      - AGENT_TYPE=empire-c2
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
    volumes:
      - empire-tools:/opt/tools
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Fuzzing Agent - Web Fuzzing, Directory Discovery
  # MITRE Tactics: Discovery, Reconnaissance
  offsec-fuzzing:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.fuzzing-tools
    image: rtpi/fuzzing-tools:latest
    container_name: rtpi-fuzzing-agent
    stdin_open: true
    environment:
      - AGENT_TYPE=fuzzing
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-wordlist-storag}
    volumes:
      - fuzzing-tools:/opt/tools
      - fuzzing-wordlists:/opt/wordlists
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Framework Security Agent - Technology Stack Detection
  # MITRE Tactics: Reconnaissance, Initial Access
  offsec-framework:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.framework-tools
    image: rtpi/framework-tools:latest
    container_name: rtpi-framework-agent
    stdin_open: true
    environment:
      - AGENT_TYPE=framework-security
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
    volumes:
      - framework-tools:/opt/tools
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Research Agent - General R&D, Tool Testing, POC Creation
  # MITRE Tactics: All (General Research)
  offsec-research:
    build:
      context: ./docker/offsec-agents
      dockerfile: Dockerfile.research-tools
    image: rtpi/research-tools:latest
    container_name: rtpi-research-agent
    stdin_open: true
    ports:
      - "8888:8888"  # JupyterLab for research notebooks
    environment:
      - AGENT_TYPE=research
      - TOOLS_PATH=/opt/tools
      - DOCS_PATH=/docs
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-wordlist-storag}
    volumes:
      - research-tools:/opt/tools
      - research-notebooks:/home/rtpi-agent/research
      - shared-data:/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 60s
      timeout: 10s
      retries: 3

# Application (Development)
#  app:
#    build:
#      context: .
#      dockerfile: Dockerfile.dev
#    container_name: rtpi-app
#    ports:
#      - "3000:3000"
#      - "5000:5000"
#    environment:
#      NODE_ENV: development
#      DATABASE_URL: postgresql://rtpi:rtpi@postgres:5432/rtpi_main
#      REDIS_URL: redis://redis:6379
#      PORT: 3000
#    volumes:
#      - .:/app
#      - /app/node_modules
#    depends_on:
#      postgres:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
#    networks:
#      - rtpi-network

  # ===========================================================================
  # SysReptor - Penetration Testing Documentation & Reporting
  # Usage: docker compose --profile sysreptor up -d
  # Access: http://localhost:7777 (via Caddy proxy)
  # ===========================================================================

  sysreptor-app:
    image: syslifters/sysreptor:2025.37
    container_name: rtpi-sysreptor-app
    profiles:
      - sysreptor
    restart: unless-stopped
    ports:
      - "9000:8000"  # Direct SysReptor API/app access
    volumes:
      - sysreptor-app-data:/app/data
      - ./configs/rtpi-sysreptor/app.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      sysreptor-redis:
        condition: service_healthy
    env_file:
      - ./configs/rtpi-sysreptor/app.env
    command: /bin/bash /app/api/start.sh
    networks:
      - rtpi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sysreptor-caddy:
    image: caddy:2.8
    container_name: rtpi-sysreptor-caddy
    profiles:
      - sysreptor
    restart: unless-stopped
    ports:
      - "7777:7777"  # Primary SysReptor access via Caddy proxy
    volumes:
      - sysreptor-caddy-data:/data
      - ./configs/rtpi-sysreptor/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - sysreptor-app
    networks:
      - rtpi-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sysreptor-redis:
    image: bitnami/redis:7.2
    container_name: rtpi-sysreptor-redis
    profiles:
      - sysreptor
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=sysreptorredispassword
    networks:
      - rtpi-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sysreptorredispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Portainer - Container Management UI
  # Usage: docker compose --profile management up -d
  # Access: https://localhost:9443
  # First login sets admin password
  # ===========================================================================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: rtpi-portainer
    profiles:
      - management
    restart: unless-stopped
    ports:
      - "9443:9443"  # HTTPS UI
      - "8000:8000"  # Edge agent tunnel (optional)
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtpi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:9443/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Kasm Containerized Workspaces (optional — adds pre-built desktop images)
  # Requires the kasm profile: docker compose --profile kasm up -d
  # VS Code: http://localhost:6901
  # Kali: http://localhost:6902
  # Default VNC password: password  (change via VNC_PW env var)
  # ===========================================================================

  kasm-vscode:
    image: kasmweb/vs-code:1.16.0
    container_name: rtpi-kasm-vscode
    profiles:
      - kasm
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "6901:6901"  # VS Code web interface
    volumes:
      - kasm-vscode-data:/home/kasm-user
    environment:
      - VNC_PW=${KASM_VNC_PASSWORD:-password}
      - KASM_SVC_AUDIO=0
      - KASM_SVC_UPLOADS=1
      - KASM_SVC_DOWNLOADS=1
      - DISABLE_SSL=true
      - KASM_SVC_FORCE_HTTPS=0
    shm_size: "512m"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rtpi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6901/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kasm-kali:
    image: kasmweb/kali-rolling-desktop:1.16.0
    container_name: rtpi-kasm-kali
    profiles:
      - kasm
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "6902:6901"  # Kali web interface (mapped to different host port)
    volumes:
      - kasm-kali-data:/home/kasm-user
    environment:
      - VNC_PW=${KASM_VNC_PASSWORD:-password}
      - KASM_SVC_AUDIO=1
      - KASM_SVC_UPLOADS=1
      - KASM_SVC_DOWNLOADS=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rtpi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6901/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rtpi-network:
    driver: bridge

